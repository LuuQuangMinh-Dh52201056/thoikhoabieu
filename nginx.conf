server {
    listen 10000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /assets/config/firebase_config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
